<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Invaders</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --neon-blue:   #00d4ff;
      --neon-purple: #cc44ff;
      --neon-gold:   #ffd700;
      --neon-red:    #ff3355;
      --bg-dark:     #03001a;
    }

    body {
      background: var(--bg-dark);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; overflow: hidden;
      font-family: 'Rajdhani', 'Arial', sans-serif;
    }

    /* ── Animated star canvas behind ALL overlays ── */
    #bgCanvas {
      position: fixed; inset: 0; width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }

    canvas#gameCanvas { display: block; position: relative; z-index: 1; }

    /* ── Overlay base ── */
    .overlay {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
    }

    /* ════════════════ MAIN MENU ════════════════ */
    #mainMenu .menu-wrap {
      position: relative; text-align: center;
      display: flex; flex-direction: column; align-items: center;
    }

    .game-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 4.2rem; font-weight: 900;
      letter-spacing: 0.22em; text-transform: uppercase;
      background: linear-gradient(135deg, #ffffff 0%, var(--neon-blue) 40%, var(--neon-purple) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 24px rgba(0,212,255,0.7));
      animation: titlePulse 3s ease-in-out infinite;
      margin-bottom: 4px;
    }
    @keyframes titlePulse {
      0%,100% { filter: drop-shadow(0 0 24px rgba(0,212,255,0.7)); }
      50%      { filter: drop-shadow(0 0 42px rgba(180,80,255,0.9)); }
    }

    .game-tagline {
      font-family: 'Orbitron', sans-serif;
      color: rgba(100,180,255,0.65); font-size: 0.78rem;
      letter-spacing: 0.4em; text-transform: uppercase;
      margin-bottom: 56px;
    }

    .menu-buttons { display: flex; flex-direction: column; gap: 14px; width: 320px; }

    .menu-btn {
      position: relative; overflow: hidden;
      padding: 16px 32px; border: none; border-radius: 6px;
      font-family: 'Orbitron', sans-serif; font-size: 0.82rem;
      font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
      cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
      clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
    }
    .menu-btn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.08) 50%, transparent 100%);
      transform: translateX(-100%); transition: transform 0.4s;
    }
    .menu-btn:hover::before { transform: translateX(100%); }
    .menu-btn:hover  { transform: translateY(-3px); }
    .menu-btn:active { transform: translateY(0); }

    .menu-btn-primary {
      background: linear-gradient(135deg, #0a6fff 0%, #0033cc 60%, #1a00aa 100%);
      color: #fff;
      box-shadow: 0 0 20px rgba(0,100,255,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
    }
    .menu-btn-primary:hover { box-shadow: 0 0 36px rgba(0,150,255,0.8), inset 0 1px 0 rgba(255,255,255,0.2); }

    .menu-btn-secondary {
      background: rgba(255,255,255,0.04);
      color: var(--neon-blue);
      border: 1px solid rgba(0,212,255,0.35);
      box-shadow: 0 0 12px rgba(0,212,255,0.1), inset 0 0 12px rgba(0,0,0,0.3);
    }
    .menu-btn-secondary:hover {
      background: rgba(0,212,255,0.08);
      box-shadow: 0 0 24px rgba(0,212,255,0.3);
    }

    /* Scanline decoration on menu */
    .menu-wrap::after {
      content: ''; position: absolute;
      inset: -40px; z-index: -1;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,212,255,0.015) 3px, rgba(0,212,255,0.015) 4px);
      pointer-events: none;
    }

    /* Corner bracket decorations */
    .corner { position: absolute; width: 28px; height: 28px; }
    .corner-tl { top: -20px; left: -20px; border-top: 2px solid var(--neon-blue); border-left: 2px solid var(--neon-blue); }
    .corner-tr { top: -20px; right: -20px; border-top: 2px solid var(--neon-blue); border-right: 2px solid var(--neon-blue); }
    .corner-bl { bottom: -20px; left: -20px; border-bottom: 2px solid var(--neon-blue); border-left: 2px solid var(--neon-blue); }
    .corner-br { bottom: -20px; right: -20px; border-bottom: 2px solid var(--neon-blue); border-right: 2px solid var(--neon-blue); }

    /* ════════════════ SHIP SELECT ════════════════ */
    #shipSelectMenu .select-wrap {
      text-align: center; max-width: 920px; width: 100%;
    }

    .select-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem; font-weight: 700;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--neon-blue);
      text-shadow: 0 0 16px rgba(0,212,255,0.6);
      margin-bottom: 8px;
    }
    .select-sub {
      color: rgba(160,200,255,0.5); font-size: 0.82rem;
      letter-spacing: 0.18em; margin-bottom: 36px;
    }

    .ship-cards {
      display: flex; gap: 22px; justify-content: center;
      margin-bottom: 36px; flex-wrap: wrap;
    }

    .ship-card {
      position: relative; width: 240px;
      background: linear-gradient(160deg, rgba(0,20,60,0.92) 0%, rgba(0,5,25,0.96) 100%);
      border: 1px solid rgba(0,150,255,0.2);
      border-radius: 12px; padding: 22px 18px 18px;
      cursor: pointer; transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      text-align: center;
      clip-path: polygon(0 12px, 12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%);
    }
    .ship-card:hover {
      transform: translateY(-6px);
      border-color: rgba(0,212,255,0.6);
      box-shadow: 0 0 30px rgba(0,212,255,0.25);
    }
    .ship-card.selected {
      border-color: var(--neon-blue);
      box-shadow: 0 0 40px rgba(0,212,255,0.5), inset 0 0 20px rgba(0,100,255,0.1);
    }
    .ship-card.selected::after {
      content: '✓ SELECTED';
      position: absolute; top: 8px; right: 8px;
      font-family: 'Orbitron', sans-serif; font-size: 0.55rem;
      color: var(--neon-blue); letter-spacing: 0.12em;
    }

    .ship-preview-canvas {
      display: block; margin: 0 auto 12px;
      border-radius: 8px;
    }

    .ship-name {
      font-family: 'Orbitron', sans-serif; font-size: 0.88rem;
      font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
      margin-bottom: 4px;
    }
    .ship-class { font-size: 0.72rem; letter-spacing: 0.1em; opacity: 0.55; margin-bottom: 12px; }

    .ship-stats { margin-bottom: 12px; }
    .stat-row {
      display: flex; justify-content: space-between; align-items: center;
      margin: 5px 0; font-size: 0.78rem;
    }
    .stat-label { color: rgba(160,200,255,0.7); font-size: 0.72rem; letter-spacing: 0.08em; }
    .stat-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; margin: 0 8px; }
    .stat-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

    .ship-power {
      font-size: 0.72rem; color: rgba(255,220,100,0.85);
      letter-spacing: 0.06em; line-height: 1.5;
      border-top: 1px solid rgba(255,255,255,0.06); padding-top: 10px;
    }
    .ship-power strong { color: var(--neon-gold); display: block; margin-bottom: 2px; font-family: 'Orbitron', sans-serif; font-size: 0.65rem; }

    /* ════════════════ SETTINGS ════════════════ */
    #settingsMenu .settings-wrap {
      background: linear-gradient(160deg, rgba(5,5,30,0.97) 0%, rgba(0,0,15,0.99) 100%);
      border: 1px solid rgba(0,212,255,0.2);
      border-radius: 16px; padding: 44px 52px;
      min-width: 460px;
      box-shadow: 0 0 60px rgba(0,100,255,0.15), inset 0 0 40px rgba(0,0,0,0.5);
    }
    .settings-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.2rem; font-weight: 700;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--neon-blue); margin-bottom: 32px;
      text-shadow: 0 0 14px rgba(0,212,255,0.5);
    }
    .setting-row {
      display: flex; align-items: center;
      justify-content: space-between; margin: 20px 0; gap: 20px;
    }
    .setting-row label {
      color: rgba(160,200,255,0.8); font-size: 0.88rem;
      letter-spacing: 0.08em; min-width: 130px;
      font-family: 'Orbitron', sans-serif; font-size: 0.72rem;
    }
    .setting-row input[type=range] { flex: 1; accent-color: var(--neon-blue); height: 4px; }
    .setting-row .val { color: #fff; font-size: 0.85rem; min-width: 42px; text-align: right; }
    .setting-row select {
      flex: 1; background: rgba(0,20,60,0.8); color: #fff;
      border: 1px solid rgba(0,212,255,0.3); border-radius: 6px;
      padding: 8px 12px; font-size: 0.88rem;
    }
    .divider { border: none; border-top: 1px solid rgba(0,212,255,0.12); margin: 24px 0; }

    /* ════════════════ SHARED BACK BTN ════════════════ */
    .btn-back {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 24px; border: 1px solid rgba(0,212,255,0.3);
      border-radius: 6px; background: rgba(0,212,255,0.06);
      color: var(--neon-blue); font-family: 'Orbitron', sans-serif;
      font-size: 0.72rem; letter-spacing: 0.14em; cursor: pointer;
      transition: all 0.2s; margin-top: 8px;
    }
    .btn-back:hover { background: rgba(0,212,255,0.14); box-shadow: 0 0 16px rgba(0,212,255,0.25); }

    /* floating particles on menu */
    .particle { position: absolute; border-radius: 50%; animation: floatUp linear infinite; opacity: 0; }
    @keyframes floatUp {
      0%   { transform: translateY(0) scale(1); opacity: 0.6; }
      100% { transform: translateY(-120px) scale(0); opacity: 0; }
    }
  </style>
</head>
<body>
  <canvas id="bgCanvas"></canvas>

  <!-- ── Main Menu ── -->
  <div class="overlay" id="mainMenu">
    <div class="menu-wrap">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>

      <div class="game-title">Space Invaders</div>
      <div class="game-tagline">◈ &nbsp; Defend the Galaxy &nbsp; ◈</div>

      <div class="menu-buttons">
        <button class="menu-btn menu-btn-primary" id="btnStart">
          ▶ &nbsp; Launch Mission
        </button>
        <button class="menu-btn menu-btn-secondary" id="btnSelectShip">
          🚀 &nbsp; Choose Spacecraft
        </button>
        <button class="menu-btn menu-btn-secondary" id="btnSettings">
          ⚙ &nbsp; Settings
        </button>
      </div>
    </div>
  </div>

  <!-- ── Ship Select ── -->
  <div class="overlay" id="shipSelectMenu" style="display:none">
    <div class="select-wrap">
      <div class="select-title">◈ Choose Your Spacecraft ◈</div>
      <div class="select-sub">Each ship carries a unique special ability</div>
      <div class="ship-cards" id="shipCards"></div>
      <button class="menu-btn menu-btn-primary" id="btnConfirmShip" style="width:280px;margin:0 auto">
        ✔ &nbsp; Confirm Selection
      </button>
      <br>
      <button class="btn-back" id="btnBackFromShip">← Back to Menu</button>
    </div>
  </div>

  <!-- ── Settings Panel ── -->
  <div class="overlay" id="settingsMenu" style="display:none">
    <div class="settings-wrap">
      <div class="settings-title">⚙ &nbsp; Settings</div>

      <div class="setting-row">
        <label>Sensitivity</label>
        <input type="range" id="sSensitivity" min="1" max="10" step="0.5" value="3.5">
        <span class="val" id="vSensitivity">3.5</span>
      </div>
      <div class="setting-row">
        <label>Difficulty</label>
        <select id="sDifficulty">
          <option value="easy">Easy</option>
          <option value="normal" selected>Normal</option>
          <option value="hard">Hard</option>
        </select>
      </div>
      <div class="setting-row">
        <label>Music Volume</label>
        <input type="range" id="sMusic" min="0" max="1" step="0.05" value="0.18">
        <span class="val" id="vMusic">18%</span>
      </div>

      <hr class="divider">
      <button class="menu-btn menu-btn-primary" id="btnSaveSettings" style="width:100%">✔ &nbsp; Save &amp; Back</button>
    </div>
  </div>

  <canvas id="gameCanvas" width="1100" height="750" style="display:none"></canvas>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // ── Settings (driven by the Settings panel) ──
    const settings = {
      sensitivity: 3.5,
      difficulty:  'normal',   // 'easy' | 'normal' | 'hard'
      musicVolume: 0.18
    };

    // Difficulty multipliers applied to enemy speed & spawn rate
    const DIFF_SPEED_MULT  = { easy: 0.7, normal: 1.0, hard: 1.5 };
    const DIFF_SPAWN_MULT  = { easy: 1.4, normal: 1.0, hard: 0.6 }; // <1 = faster spawn

    // ── Menu wiring ──
    const mainMenu     = document.getElementById('mainMenu');
    const settingsMenu = document.getElementById('settingsMenu');

    const sliderSens   = document.getElementById('sSensitivity');
    const valSens      = document.getElementById('vSensitivity');
    const sliderMusic  = document.getElementById('sMusic');
    const valMusic     = document.getElementById('vMusic');
    const selDiff      = document.getElementById('sDifficulty');

    sliderSens.addEventListener('input', () => {
      valSens.textContent = sliderSens.value;
    });
    sliderMusic.addEventListener('input', () => {
      valMusic.textContent = Math.round(sliderMusic.value * 100) + '%';
    });

    document.getElementById('btnSettings').addEventListener('click', () => {
      mainMenu.style.display     = 'none';
      settingsMenu.style.display = 'flex';
    });

    document.getElementById('btnSaveSettings').addEventListener('click', () => {
      settings.sensitivity = parseFloat(sliderSens.value);
      settings.difficulty  = selDiff.value;
      settings.musicVolume = parseFloat(sliderMusic.value);
      player.speed         = settings.sensitivity;
      settingsMenu.style.display = 'none';
      mainMenu.style.display     = 'flex';
    });

    // ═══════════════════════════════════════════════════════════
    // SHIP DEFINITIONS — 3 ships, each with a unique special power
    // ═══════════════════════════════════════════════════════════
    const SHIP_TYPES = [
      {
        id:        'viper',
        name:      'Viper MK-II',
        shipClass: 'Assault Fighter',
        color:     '#00d4ff',
        stats:     { speed: 7, firepower: 6, armor: 4, special: 8 },
        power: {
          name: 'Plasma Overdrive',
          desc: 'Triples bullet speed and fires in 5-way spread for 8 seconds. Activate with Q.',
          key:  'q',
          cooldown: 20000,
          duration: 8000,
          color: '#00eeff'
        }
      },
      {
        id:        'titan',
        name:      'Titan X',
        shipClass: 'Heavy Destroyer',
        color:     '#ff6600',
        stats:     { speed: 4, firepower: 9, armor: 8, special: 6 },
        power: {
          name: 'Shockwave Blast',
          desc: 'Unleashes a massive radial shockwave that destroys all on-screen enemies. Activate with Q.',
          key:  'q',
          cooldown: 25000,
          duration: 500,
          color: '#ff8800'
        }
      },
      {
        id:        'phantom',
        name:      'Phantom SR',
        shipClass: 'Stealth Interceptor',
        color:     '#aa44ff',
        stats:     { speed: 9, firepower: 5, armor: 3, special: 10 },
        power: {
          name: 'Ghost Cloak',
          desc: 'Turns invisible and invincible for 6 seconds. Enemies cannot target you. Activate with Q.',
          key:  'q',
          cooldown: 18000,
          duration: 6000,
          color: '#cc66ff'
        }
      }
    ];

    let selectedShipId   = 'viper';   // default
    let specialCooldown  = 0;         // ms remaining on cooldown
    let specialActive    = false;
    let specialTimer     = 0;         // ms remaining on active effect
    let specialFlicker   = 0;

    function getSelectedShip() {
      return SHIP_TYPES.find(s => s.id === selectedShipId) || SHIP_TYPES[0];
    }

    function activateSpecialPower() {
      if (specialCooldown > 0 || specialActive) return;
      const ship = getSelectedShip();
      specialActive  = true;
      specialTimer   = ship.power.duration;
      specialCooldown = 0;
      playSpecialSound(ship.id);

      if (ship.id === 'viper') {
        // Plasma Overdrive: 5-way spread + fast bullets for duration
        shotMode       = 'plasma';
        shotModeExpiry = Date.now() + ship.power.duration;
        rapidFireActive = true;
        rapidFireExpiry = Date.now() + ship.power.duration;
      } else if (ship.id === 'titan') {
        // Shockwave: destroy all visible enemies instantly
        for (let ei = enemies.length - 1; ei >= 0; ei--) {
          const e = enemies[ei];
          for (let b = 0; b < (e.isBoss ? 4 : 2); b++) spawnParticles(e.x, e.y);
          playExplosionSound(e.isBoss);
          if (e.isBoss) bossActive = false;
          score += e.points;
          if (!e.isBoss) {
            totalKills++;
            if (totalKills % DAYLIGHT_KILL_THRESHOLD === 0) activateDaylight();
          }
        }
        enemies.length = 0;
        // Shockwave visual
        shockwaveActive = true;
        shockwaveRadius = 10;
        shockwaveX = player.x;
        shockwaveY = player.y;
      } else if (ship.id === 'phantom') {
        // Ghost Cloak: full invincibility + cloaked (semi-transparent)
        invincible = true;
        cloakActive = true;
      }
    }

    function deactivateSpecialPower() {
      const ship = getSelectedShip();
      specialActive = false;
      specialCooldown = ship.power.cooldown;
      if (ship.id === 'viper') {
        shotMode = 'single';
        rapidFireActive = false;
      } else if (ship.id === 'phantom') {
        invincible  = false;
        cloakActive = false;
      }
    }

    // Extra state for special effects
    let shockwaveActive = false, shockwaveRadius = 0, shockwaveX = 0, shockwaveY = 0;
    let cloakActive = false;

    function updateSpecialPower(dt) {
      if (specialActive) {
        specialTimer -= dt;
        specialFlicker++;
        if (specialTimer <= 0) deactivateSpecialPower();
      }
      if (specialCooldown > 0) specialCooldown = Math.max(0, specialCooldown - dt);

      // Shockwave expand
      if (shockwaveActive) {
        shockwaveRadius += 18;
        if (shockwaveRadius > canvas.width) shockwaveActive = false;
      }

      // Plasma Overdrive: expire check
      const ship = getSelectedShip();
      if (ship.id === 'viper' && shotMode === 'plasma' && Date.now() >= shotModeExpiry) {
        shotMode = 'single';
      }
    }

    function drawSpecialEffects() {
      // Shockwave ring
      if (shockwaveActive) {
        const alpha = Math.max(0, 1 - shockwaveRadius / canvas.width);
        ctx.save();
        ctx.strokeStyle = `rgba(255,140,0,${alpha * 0.9})`;
        ctx.lineWidth   = 6;
        ctx.shadowColor = '#ff8800';
        ctx.shadowBlur  = 24;
        ctx.beginPath();
        ctx.arc(shockwaveX, shockwaveY, shockwaveRadius, 0, Math.PI * 2);
        ctx.stroke();
        // Secondary ring
        ctx.strokeStyle = `rgba(255,220,80,${alpha * 0.5})`;
        ctx.lineWidth   = 2;
        ctx.beginPath();
        ctx.arc(shockwaveX, shockwaveY, shockwaveRadius * 0.8, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
    }

    function playSpecialSound(shipId) {
      const t = audioCtx.currentTime;
      if (shipId === 'viper') {
        [220, 440, 880, 1760].forEach((f, i) => {
          const o = audioCtx.createOscillator(), g = audioCtx.createGain();
          o.type = 'sawtooth'; o.frequency.value = f;
          const s = t + i * 0.06;
          g.gain.setValueAtTime(0.18, s); g.gain.exponentialRampToValueAtTime(0.001, s + 0.3);
          o.connect(g); g.connect(audioCtx.destination); o.start(s); o.stop(s + 0.3);
        });
      } else if (shipId === 'titan') {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = 'sine'; o.frequency.setValueAtTime(80, t); o.frequency.exponentialRampToValueAtTime(20, t + 0.6);
        g.gain.setValueAtTime(0.7, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
        o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t + 0.7);
      } else if (shipId === 'phantom') {
        [880, 1046.5, 1318.5].forEach((f, i) => {
          const o = audioCtx.createOscillator(), g = audioCtx.createGain();
          o.type = 'sine'; o.frequency.value = f;
          const s = t + i * 0.1;
          g.gain.setValueAtTime(0.12, s); g.gain.exponentialRampToValueAtTime(0.001, s + 0.6);
          o.connect(g); g.connect(audioCtx.destination); o.start(s); o.stop(s + 0.6);
        });
      }
    }

    // ═══════════════════════════════════════════════════════════
    // SHIP SELECT UI
    // ═══════════════════════════════════════════════════════════
    const shipSelectMenu = document.getElementById('shipSelectMenu');
    const shipCardsEl    = document.getElementById('shipCards');

    function buildShipCards() {
      shipCardsEl.innerHTML = '';
      SHIP_TYPES.forEach(ship => {
        const card = document.createElement('div');
        card.className = 'ship-card' + (ship.id === selectedShipId ? ' selected' : '');
        card.dataset.id = ship.id;

        // Mini canvas preview
        const previewEl = document.createElement('canvas');
        previewEl.className = 'ship-preview-canvas';
        previewEl.width = 160; previewEl.height = 160;
        card.appendChild(previewEl);

        // Name + class
        const nameEl = document.createElement('div');
        nameEl.className = 'ship-name';
        nameEl.style.color = ship.color;
        nameEl.textContent = ship.name;
        card.appendChild(nameEl);

        const classEl = document.createElement('div');
        classEl.className = 'ship-class';
        classEl.textContent = ship.shipClass;
        card.appendChild(classEl);

        // Stats bars
        const statsEl = document.createElement('div');
        statsEl.className = 'ship-stats';
        [['Speed', ship.stats.speed], ['Firepower', ship.stats.firepower],

    // ── BGM ──────────────────────────────────────────────────────────────────
    // Synthesized looping background music: bass pulse + pad chords + arpeggio
    let bgmNodes = []; // keep references so we can stop them
    let bgmStarted = false;

    function startBGM() {
      if (bgmStarted) return;
      bgmStarted = true;

      const BPM      = 128;
      const BEAT     = 60 / BPM;          // seconds per beat
      const BAR      = BEAT * 4;          // 4/4 time
      const LOOP_LEN = BAR * 8;           // 8-bar loop

      // Master BGM gain (keep it under SFX)
      const masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.18;
      masterGain.connect(audioCtx.destination);
      bgmNodes.push(masterGain);

      // Slight reverb via a convolver filled with decaying noise
      function makeReverb(duration = 1.5, decay = 2) {
        const len    = audioCtx.sampleRate * duration;
        const buf    = audioCtx.createBuffer(2, len, audioCtx.sampleRate);
        for (let c = 0; c < 2; c++) {
          const d = buf.getChannelData(c);
          for (let i = 0; i < len; i++)
            d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
        }
        const conv = audioCtx.createConvolver();
        conv.buffer = buf;
        return conv;
      }
      const reverb = makeReverb();
      reverb.connect(masterGain);

      // ── Layer 1: Bass pulse (kick-style sine on beats 1 & 3) ──
      function scheduleBass(startTime) {
        const bassNotes = [55, 55, 55, 55, 44, 44, 49, 49]; // A1, E1, G#1 (Hz ×2)
        for (let bar = 0; bar < 8; bar++) {
          const freq = bassNotes[bar];
          [0, BEAT * 2].forEach(offset => {
            const t   = startTime + bar * BAR + offset;
            const osc = audioCtx.createOscillator();
            const g   = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq * 2, t);
            osc.frequency.exponentialRampToValueAtTime(freq * 0.5, t + 0.25);
            g.gain.setValueAtTime(0.8, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
            osc.connect(g); g.connect(masterGain);
            osc.start(t); osc.stop(t + 0.3);
            bgmNodes.push(osc, g);
          });
        }
      }

      // ── Layer 2: Pad chords (Am – F – C – G progression) ──
      const chords = [
        [220, 261.63, 329.63], // Am
        [174.61, 220, 261.63], // F
        [261.63, 329.63, 392], // C
        [196, 246.94, 293.66], // G
        [220, 261.63, 329.63], // Am
        [174.61, 220, 261.63], // F
        [196, 246.94, 293.66], // G
        [196, 246.94, 293.66], // G
      ];

      function schedulePad(startTime) {
        chords.forEach((chord, bar) => {
          chord.forEach(freq => {
            const t   = startTime + bar * BAR;
            const osc = audioCtx.createOscillator();
            const g   = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.value = freq;
            g.gain.setValueAtTime(0, t);
            g.gain.linearRampToValueAtTime(0.06, t + 0.3);
            g.gain.setValueAtTime(0.06, t + BAR - 0.1);
            g.gain.linearRampToValueAtTime(0, t + BAR);
            osc.connect(g); g.connect(reverb); g.connect(masterGain);
            osc.start(t); osc.stop(t + BAR);
            bgmNodes.push(osc, g);
          });
        });
      }

      // ── Layer 3: Arpeggio (hi synth melody) ──
      // 16th-note arpeggio through the chord tones × 2 octaves
      const arpSequence = [
        440, 523.25, 659.25, 880,  659.25, 523.25, 440, 392,   // bar 1 Am
        349.23, 440, 523.25, 698.46, 523.25, 440, 349.23, 293.66, // bar 2 F
        523.25, 659.25, 783.99, 1046.5, 783.99, 659.25, 523.25, 493.88, // bar 3 C
        392, 493.88, 587.33, 783.99, 587.33, 493.88, 392, 349.23, // bar 4 G
        440, 523.25, 659.25, 880,  659.25, 523.25, 440, 523.25,  // bar 5 Am
        349.23, 440, 523.25, 659.25, 523.25, 440, 349.23, 392,  // bar 6 F
        392, 493.88, 587.33, 739.99, 587.33, 493.88, 587.33, 659.25, // bar 7 G build
        783.99, 659.25, 587.33, 523.25, 493.88, 440, 392, 349.23,  // bar 8 resolve
      ];
      const SIXTEENTH = BEAT / 4;

      function scheduleArp(startTime) {
        arpSequence.forEach((freq, i) => {
          const t   = startTime + i * SIXTEENTH;
          const osc = audioCtx.createOscillator();
          const g   = audioCtx.createGain();
          osc.type = 'square';
          osc.frequency.value = freq;
          g.gain.setValueAtTime(0.08, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + SIXTEENTH * 0.85);
          osc.connect(g); g.connect(reverb); g.connect(masterGain);
          osc.start(t); osc.stop(t + SIXTEENTH);
          bgmNodes.push(osc, g);
        });
      }

      // Schedule the first loop and keep re-scheduling seamlessly
      function scheduleLoop(startTime) {
        scheduleBass(startTime);
        schedulePad(startTime);
        scheduleArp(startTime);
        // Queue next loop slightly before this one ends
        const nextStart = startTime + LOOP_LEN;
        const delay     = (nextStart - audioCtx.currentTime - 0.5) * 1000;
        setTimeout(() => {
          if (bgmStarted) scheduleLoop(nextStart);
        }, Math.max(delay, 0));
      }

      // Start slightly in the future to give the browser time to prepare
      scheduleLoop(audioCtx.currentTime + 0.1);
    }

    function stopBGM() {
      bgmStarted = false;
      // Disconnect and stop all scheduled nodes
      bgmNodes.forEach(n => {
        try { n.stop && n.stop(); } catch (_) {}
        try { n.disconnect(); }    catch (_) {}
      });
      bgmNodes = [];
    }

    function playShootSound() {
      const osc    = audioCtx.createOscillator();
      const gain   = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.type = 'square';
      const t = audioCtx.currentTime;
      osc.frequency.setValueAtTime(880, t);
      osc.frequency.exponentialRampToValueAtTime(220, t + 0.08);

      gain.gain.setValueAtTime(0.18, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);

      osc.start(t);
      osc.stop(t + 0.1);
    }

    function playExplosionSound(isBoss = false) {
      // White-noise burst via AudioBuffer
      const bufferSize = audioCtx.sampleRate * (isBoss ? 0.5 : 0.25);
      const buffer     = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data       = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

      const source = audioCtx.createBufferSource();
      source.buffer = buffer;

      // Low-pass filter to make it thuddy
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = isBoss ? 600 : 1200;

      const gain = audioCtx.createGain();
      const t    = audioCtx.currentTime;
      gain.gain.setValueAtTime(isBoss ? 0.6 : 0.35, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + (isBoss ? 0.5 : 0.25));

      source.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);
      source.start(t);
    }

      core.addColorStop(0.25,'rgba(210,200,255,0.60)');
      core.addColorStop(0.6, 'rgba(140,110,255,0.25)');
      core.addColorStop(1,   'rgba(0,0,0,0)');
      nc.fillStyle = core;
      nc.save(); nc.scale(1.9, 0.65);
      nc.beginPath(); nc.arc(cx / 1.9, cy / 0.65, W * 0.09, 0, Math.PI * 2); nc.fill(); nc.restore();

      // Iconic dust lane
      const dustLane = nc.createLinearGradient(0, cy - H * 0.045, 0, cy + H * 0.045);
      dustLane.addColorStop(0,   'rgba(0,0,0,0)');
      dustLane.addColorStop(0.38,'rgba(1,0,8,0.60)');
      dustLane.addColorStop(0.62,'rgba(1,0,8,0.60)');
      dustLane.addColorStop(1,   'rgba(0,0,0,0)');
      nc.fillStyle = dustLane;
      nc.save(); nc.scale(2.1, 1);
      nc.fillRect(-W, cy / 1 - H * 0.045, W * 4, H * 0.09); nc.restore();

      // Thin secondary filaments
      [0.025, -0.02, 0.042].forEach((off, i) => {
        const dl = nc.createLinearGradient(0, cy + H * off - 3, 0, cy + H * off + 3);
        dl.addColorStop(0,   'rgba(0,0,0,0)');
        dl.addColorStop(0.5, `rgba(0,0,6,${0.22 + i * 0.06})`);
        dl.addColorStop(1,   'rgba(0,0,0,0)');
        nc.fillStyle = dl;
        nc.save(); nc.scale(1.9, 1); nc.fillRect(-W, cy + H * off - 3, W * 4, 6); nc.restore();
      });

      // Blue reflection nebula
      const reflNeb = nc.createRadialGradient(cx + W * 0.06, cy - H * 0.09, 0, cx + W * 0.06, cy - H * 0.09, W * 0.22);
      reflNeb.addColorStop(0,   'rgba(70,130,255,0.13)');
      reflNeb.addColorStop(0.45,'rgba(50,90,210,0.06)');
      reflNeb.addColorStop(1,   'rgba(0,0,0,0)');
      nc.fillStyle = reflNeb; nc.beginPath(); nc.arc(cx + W * 0.06, cy - H * 0.09, W * 0.22, 0, Math.PI * 2); nc.fill();

      // Warm golden lower glow
      const warmGlow = nc.createRadialGradient(cx - W * 0.07, cy + H * 0.08, 0, cx - W * 0.07, cy + H * 0.08, W * 0.24);
      warmGlow.addColorStop(0,   'rgba(255,190,70,0.08)');
      warmGlow.addColorStop(0.5, 'rgba(190,130,30,0.04)');
      warmGlow.addColorStop(1,   'rgba(0,0,0,0)');
      nc.fillStyle = warmGlow; nc.beginPath(); nc.arc(cx - W * 0.07, cy + H * 0.08, W * 0.24, 0, Math.PI * 2); nc.fill();

      // Dense disk star cluster
      for (let i = 0; i < 900; i++) {
        const angle = Math.random() * Math.PI * 2;
        const dist  = Math.pow(Math.random(), 1.3) * W * 0.44;
        const sx    = cx + Math.cos(angle) * dist * 2.5;
        const sy    = cy + Math.sin(angle) * dist * 0.32;
        const sr    = Math.random() * 1.0 + 0.1;
        nc.globalAlpha = Math.random() * 0.5 + 0.08;
        nc.fillStyle   = `hsl(${210 + Math.random() * 90}, ${35 + Math.random() * 40}%, ${65 + Math.random() * 30}%)`;
        nc.beginPath(); nc.arc(sx, sy, sr, 0, Math.PI * 2); nc.fill();
      }
      nc.globalAlpha = 1;
    })();

    let galaxyTick = 0;   // for twinkling animation

    function updateStars() {
      galaxyTick += 0.02;
      for (const s of stars) {
        s.y += s.speed;
        if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
      }
      for (const s of brightStars) {
        s.y += s.speed;
        if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
      }
    }

    function drawStars() {
      // Beluga galaxy static layer
      ctx.drawImage(nebulaCanvas, 0, 0);

      // Animated core pulse
      const pulse = 0.8 + 0.2 * Math.sin(galaxyTick * 0.35);
      ctx.save();
      ctx.globalAlpha = pulse * 0.055;
      ctx.fillStyle   = '#bbaaff';
      ctx.beginPath();
      ctx.ellipse(canvas.width / 2, canvas.height / 2, canvas.width * 0.32, canvas.height * 0.10, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      ctx.save();
      // Dim stars
      for (const s of stars) {
        const twinkled = s.opacity * (0.7 + 0.3 * Math.sin(galaxyTick * 1.5 + s.twinkle));
        ctx.globalAlpha = twinkled;
        ctx.fillStyle   = `hsl(${200 + Math.random() * 60}, 50%, 90%)`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
        ctx.fill();
      }
      // Bright foreground stars with cross-flare
      for (const s of brightStars) {
        const twinkled = s.opacity * (0.6 + 0.4 * Math.sin(galaxyTick * 2.5 + s.twinkle));
        ctx.globalAlpha  = twinkled;
        ctx.fillStyle    = '#ffffff';
        ctx.shadowColor  = '#aaccff';
        ctx.shadowBlur   = 4;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
        ctx.fill();
        // Cross flare on bigger stars
        if (s.radius > 2) {
          ctx.globalAlpha = twinkled * 0.4;
          ctx.strokeStyle = '#ffffff';
          ctx.lineWidth   = 0.6;
          ctx.beginPath();
          ctx.moveTo(s.x - s.radius * 3, s.y);
          ctx.lineTo(s.x + s.radius * 3, s.y);
          ctx.moveTo(s.x, s.y - s.radius * 3);
          ctx.lineTo(s.x, s.y + s.radius * 3);
          ctx.stroke();
        }
      }
      ctx.globalAlpha = 1;
      ctx.shadowBlur  = 0;
      ctx.restore();
    }

    // --- Keyboard state ---
    const keys = {};
    let gamePaused       = false;
    let pauseHoverIndex  = 0;  // 0=Resume 1=Restart 2=Exit

    function executePauseItem(index) {
      if (index === 0) { gamePaused = false; }
      else if (index === 1) { gamePaused = false; resetGame(); }
      else if (index === 2) {
        gamePaused  = false; gameOver = false; gameStarted = false;
        canvas.style.display   = 'none';
        mainMenu.style.display = 'flex';
        stopBGM();
      }
    }

    window.addEventListener('keydown', e => {
      keys[e.key] = true;
      if (e.key === 'r' || e.key === 'R') {
        if (gameOver) resetGame();
      }
      if ((e.key === 'm' || e.key === 'M') && gameOver) {
        gameOver    = false;
        gameStarted = false;
        canvas.style.display   = 'none';
        mainMenu.style.display = 'flex';
        stopBGM();
      }
      // Pause / resume with Escape or P
      if ((e.key === 'Escape' || e.key === 'p' || e.key === 'P') && gameStarted && !gameOver) {
        gamePaused = !gamePaused;
        pauseHoverIndex = 0;
      }
      // Pause menu navigation
      if (gamePaused) {
        if (e.key === 'ArrowUp')   pauseHoverIndex = (pauseHoverIndex + 2) % 3;
        if (e.key === 'ArrowDown') pauseHoverIndex = (pauseHoverIndex + 1) % 3;
        if (e.key === 'Enter')     executePauseItem(pauseHoverIndex);
      }
      // Special power with Q
      if ((e.key === 'q' || e.key === 'Q') && gameStarted && !gameOver && !gamePaused) {
        activateSpecialPower();
      }
    });
    window.addEventListener('keyup', e => { keys[e.key] = false; });

    // --- Reset / Restart ---
    function resetGame() {
      score  = 0;
      lives  = 5;
      gameOver = false;
      player.x     = canvas.width / 2;
      player.speed = settings.sensitivity;
      bullets.length = 0;
      enemies.length = 0;
      particles.length = 0;
      lastShotTime = 0;
      lastEnemySpawnTime = 0;
      lastBossSpawnTime  = 0;
      bossActive         = false;
      bonusMonsters.length = 0;
      lastBonusSpawnTime   = 0;
      powerups.length    = 0;
      lastPowerupSpawnTime = 0;
      rapidFireActive    = false;
      rapidFireExpiry    = 0;
      shotMode           = 'single';
      shotModeExpiry     = 0;
      laserActive        = false;
      laserExpiry        = 0;
      laserFlicker       = 0;
      gamePaused         = false;
      specialActive      = false;
      specialCooldown    = 0;
      specialTimer       = 0;
      specialFlicker     = 0;
      shockwaveActive    = false;
      cloakActive        = false;
      player.color       = getSelectedShip().color;
      level              = 1;
      levelUpBannerTimer = 0;
      applyShipUpgrade(); // reset to level-1 stats
      totalKills         = 0;
      daylightActive     = false;
      daylightExpiry     = 0;
      daylightTimer      = 0;
      invincible         = false;
      invincibleFlicker  = 0;
      startBGM();
    }

    // --- Bullets ---
    const BULLET_SPEED    = 8;
    const BULLET_COOLDOWN = 250; // ms
    const bullets = [];
    let lastShotTime = 0;

    // shotMode: 'single' | 'double' | 'triple' | 'laser'
    let shotMode       = 'single';
    let shotModeExpiry = 0;
    const SHOT_MODE_DURATION = 6000; // 6 seconds

    // Laser beam state
    let laserActive  = false;
    let laserExpiry  = 0;
    let laserFlicker = 0;  // animation counter

    function spawnBullet(offsetX = 0, angleOffset = 0) {
      const spd = player.bulletSpeed || BULLET_SPEED;
      bullets.push({
        x:  player.x + offsetX,
        y:  player.y - player.height / 2,
        vx: Math.sin(angleOffset) * spd,
        vy: -Math.cos(angleOffset) * spd,
        width:  7,
        height: 12,
        speed:  spd,
        color:  shotMode === 'triple' ? '#ff88ff'
              : shotMode === 'double' ? '#88eeff'
              : '#ffe600'
      });
    }

    function fireBullets() {
      if (shotMode === 'laser') return;
      if (shotMode === 'plasma') {
        // Viper special: 5-way fan spread
        [-0.36, -0.18, 0, 0.18, 0.36].forEach(a => spawnBullet(0, a));
      } else if (shotMode === 'triple') {
        spawnBullet(0,    0);
        spawnBullet(0, -0.18);
        spawnBullet(0,  0.18);
      } else if (shotMode === 'double') {
        spawnBullet(-14, 0);
        spawnBullet( 14, 0);
      } else {
        spawnBullet(0, 0);
      }
      playShootSound();
    }

    // --- Laser beam ---
    const LASER_DURATION = 6000;

    function updateLaser(dt) {
      if (!laserActive) return;
      laserFlicker++;
      if (Date.now() >= laserExpiry) {
        laserActive = false;
        if (shotMode === 'laser') shotMode = 'single';
      }

      // Continuous damage: every frame check enemies under the laser beam
      const lx = player.x;
      for (let ei = enemies.length - 1; ei >= 0; ei--) {
        const e = enemies[ei];
        if (Math.abs(e.x - lx) < e.size / 2 + 6) {
          // Laser hits every ~8 frames to balance damage
          if (laserFlicker % 8 === 0) {
            e.hp--;
            spawnParticles(e.x, e.y - e.size / 4);
            if (e.hp <= 0) {
              const burstCount = e.isBoss ? 3 : 1;
              for (let b = 0; b < burstCount; b++) spawnParticles(e.x, e.y);
              playExplosionSound(e.isBoss);
              if (e.isBoss) bossActive = false;
              score += e.points;
              if (!e.isBoss) {
                totalKills++;
                if (totalKills % DAYLIGHT_KILL_THRESHOLD === 0) activateDaylight();
              }
              enemies.splice(ei, 1);
            }
          }
        }
      }
      // Also check bonus monsters
      for (let mi = bonusMonsters.length - 1; mi >= 0; mi--) {
        const m = bonusMonsters[mi];
        if (Math.abs(m.x - lx) < m.size / 2 + 6 && laserFlicker % 8 === 0) {
          m.hp--;
          if (m.hp <= 0) {
            lives = Math.min(9, lives + 1);
            spawnParticles(m.x, m.y);
            spawnParticles(m.x, m.y);
            playLifeUpSound();
            bonusMonsters.splice(mi, 1);
          }
        }
      }
    }

    function drawLaser() {
      if (!laserActive) return;
      const x = player.x;
      const y = player.y - player.height / 2;

      ctx.save();
      // Outer wide glow
      const flicker = 0.7 + Math.sin(laserFlicker * 0.4) * 0.3;
      ctx.globalAlpha = flicker;

      // Core beam
      const grad = ctx.createLinearGradient(x, 0, x, y);
      grad.addColorStop(0,   'rgba(255,100,0,0)');
      grad.addColorStop(0.3, 'rgba(255,140,0,0.6)');
      grad.addColorStop(1,   'rgba(255,220,80,1)');

      // Wide glow layer
      ctx.shadowColor = '#ff6600';
      ctx.shadowBlur  = 30;
      ctx.fillStyle   = 'rgba(255,80,0,0.18)';
      ctx.fillRect(x - 18, 0, 36, y);

      // Mid glow
      ctx.shadowBlur  = 15;
      ctx.fillStyle   = 'rgba(255,140,0,0.35)';
      ctx.fillRect(x - 9, 0, 18, y);

      // Bright core
      ctx.shadowBlur  = 6;
      ctx.fillStyle   = grad;
      ctx.fillRect(x - 4, 0, 8, y);

      // White-hot center line
      ctx.shadowColor = '#ffffff';
      ctx.shadowBlur  = 8;
      ctx.fillStyle   = 'rgba(255,255,220,0.9)';
      ctx.fillRect(x - 2, 0, 4, y);

      ctx.globalAlpha = 1;
      ctx.restore();
    }

    function updateBullets() {
      const now = Date.now();

      // Expire shot mode
      if (shotMode !== 'single' && shotMode !== 'laser' && shotMode !== 'plasma' && now >= shotModeExpiry) {
        shotMode = 'single';
      }

      if (keys[' '] && now - lastShotTime >= (rapidFireActive ? COOLDOWN_RAPID : COOLDOWN_NORMAL)) {
        if (shotMode === 'laser') {
          // Laser is always-on while active; spacebar plays a crackle
          playLaserSound();
        } else {
          fireBullets();
        }
        lastShotTime = now;
      }

      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        if (b.vx !== undefined) {
          b.x += b.vx;
          b.y += b.vy;
        } else {
          b.y -= b.speed;
        }
        if (b.y + b.height < 0 || b.x < -20 || b.x > canvas.width + 20) {
          bullets.splice(i, 1);
        }
      }
    }

    function drawBullets() {
      ctx.save();
      for (const b of bullets) {
        ctx.fillStyle   = b.color;
        ctx.shadowColor = b.color;
        ctx.shadowBlur  = 10;
        // Rotate bullet along travel direction for angled shots
        const angle = b.vx ? Math.atan2(b.vx, -b.vy) : 0;
        ctx.save();
        ctx.translate(b.x, b.y + b.height / 2);
        ctx.rotate(angle);
        ctx.beginPath();
        ctx.roundRect(-b.width / 2, -b.height / 2, b.width, b.height, 2);
        ctx.fill();
        ctx.restore();
      }
      ctx.restore();
    }

    // --- Score & Lives ---
    let score = 0;
    let lives = 5;
    let gameOver = false;

    // --- Daylight / Invincibility mode ---
    const DAYLIGHT_KILL_THRESHOLD = 10;     // kills needed to trigger
    const DAYLIGHT_DURATION       = 10000;  // 10 seconds in ms
    let totalKills        = 0;
    let daylightActive    = false;
    let daylightExpiry    = 0;
    let daylightTimer     = 0;   // countdown ms for HUD bar
    let invincible        = false;
    let invincibleFlicker = 0;   // frame counter for ship flash effect

    function activateDaylight() {
      daylightActive = true;
      daylightExpiry = Date.now() + DAYLIGHT_DURATION;
      daylightTimer  = DAYLIGHT_DURATION;
      invincible     = true;
      playDaylightSound();
    }

    function updateDaylight(dt) {
      if (!daylightActive) return;
      daylightTimer -= dt;
      invincibleFlicker++;
      if (Date.now() >= daylightExpiry) {
        daylightActive = false;
        invincible     = false;
        daylightTimer  = 0;
      }
    }

    function playDaylightSound() {
      // Bright rising chord stab
      const t = audioCtx.currentTime;
      [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
        const osc  = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        const s = t + i * 0.07;
        gain.gain.setValueAtTime(0.22, s);
        gain.gain.exponentialRampToValueAtTime(0.001, s + 0.5);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(s);
        osc.stop(s + 0.5);
      });
    }

    // --- Level system ---
    let level = 1;
    let prevLevel = 1;

    // Points needed to reach the next level
    const POINTS_PER_LEVEL = 100;

    // Flash banner shown briefly on level-up
    let levelUpBannerTimer = 0;   // counts down in ms
    const LEVEL_UP_BANNER_MS = 2000;

    // Returns the current enemy speed scaled by level + difficulty
    function enemySpeed() {
      return (ENEMY_SPEED + (level - 1) * 0.4) * DIFF_SPEED_MULT[settings.difficulty];
    }
    // Returns the current spawn interval scaled by level + difficulty (min 250 ms)
    function enemySpawnInterval() {
      return Math.max(250, (ENEMY_SPAWN_INTERVAL - (level - 1) * 80) * DIFF_SPAWN_MULT[settings.difficulty]);
    }

    // --- Ship upgrade stats per level ---
    // Each level grants: more speed, bigger size, more bullet speed, stronger glow
    function shipStatsForLevel(lvl) {
      return {
        width:       90  + Math.min(lvl - 1, 9) * 5,    // +5px per level, max +45
        height:      90  + Math.min(lvl - 1, 9) * 5,
        speed:       settings.sensitivity + Math.min(lvl - 1, 9) * 0.2,  // +0.2 per level
        bulletSpeed: 8   + Math.min(lvl - 1, 9) * 0.8,  // +0.8 per level
        glowRadius:  20  + Math.min(lvl - 1, 9) * 4,    // glow grows with power
        glowColor:   lvl >= 8 ? '#ff4400'                // red-hot at high levels
                   : lvl >= 5 ? '#ff00ff'                // purple at mid levels
                   : '#4488ff'                           // default blue
      };
    }

    function applyShipUpgrade() {
      const stats = shipStatsForLevel(level);
      player.width       = stats.width;
      player.height      = stats.height;
      player.speed       = stats.speed;
      player.glowRadius  = stats.glowRadius;
      player.glowColor   = stats.glowColor;
      player.bulletSpeed = stats.bulletSpeed;
    }

    function updateLevel(dt) {
      const newLevel = Math.floor(score / POINTS_PER_LEVEL) + 1;
      if (newLevel > level) {
        level = newLevel;
        levelUpBannerTimer = LEVEL_UP_BANNER_MS;
        playLevelUpSound();
        applyShipUpgrade();   // upgrade ship on every level-up
      }
      if (levelUpBannerTimer > 0) levelUpBannerTimer -= dt;
    }

    function playLevelUpSound() {
      const t = audioCtx.currentTime;
      // Quick ascending fanfare: C – E – G – C'
      [261.63, 329.63, 392, 523.25].forEach((freq, i) => {
        const osc  = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.value = freq;
        const s = t + i * 0.1;
        gain.gain.setValueAtTime(0.15, s);
        gain.gain.exponentialRampToValueAtTime(0.001, s + 0.18);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(s);
        osc.stop(s + 0.18);
      });
    }

    // --- Power-ups ---
    // Types: 'rapid' (green) | 'double' (cyan) | 'triple' (magenta)
    const POWERUP_RADIUS         = 14;
    const POWERUP_SPEED          = 1.8;
    const POWERUP_SPAWN_INTERVAL = 20000; // ms between spawns
    const RAPID_FIRE_DURATION    = 5000;
    const COOLDOWN_NORMAL        = 250;
    const COOLDOWN_RAPID         = 125;

    const POWERUP_TYPES = [
      { type: 'rapid',  color: '#00ff44', glow: '#00ff88', label: '⚡' },
      { type: 'double', color: '#00ddff', glow: '#88eeff', label: '❙❙' },
      { type: 'triple', color: '#ff44ff', glow: '#ff88ff', label: '❙❙❙' },
      { type: 'laser',  color: '#ff4400', glow: '#ff8833', label: '▌' },
    ];

    const powerups = [];
    let lastPowerupSpawnTime = 0;
    let rapidFireActive      = false;
    let rapidFireExpiry      = 0;

    function spawnPowerup() {
      const def = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
      powerups.push({
        x:      Math.random() * (canvas.width - POWERUP_RADIUS * 2) + POWERUP_RADIUS,
        y:      -POWERUP_RADIUS,
        radius: POWERUP_RADIUS,
        speed:  POWERUP_SPEED,
        pulse:  0,
        ...def
      });
    }

    function applyPowerup(type) {
      const now = Date.now();
      if (type === 'rapid') {
        rapidFireActive = true;
        rapidFireExpiry = now + RAPID_FIRE_DURATION;
      } else if (type === 'double') {
        shotMode       = 'double';
        shotModeExpiry = now + SHOT_MODE_DURATION;
      } else if (type === 'triple') {
        shotMode       = 'triple';
        shotModeExpiry = now + SHOT_MODE_DURATION;
      } else if (type === 'laser') {
        shotMode    = 'laser';
        laserActive = true;
        laserExpiry = now + LASER_DURATION;
        laserFlicker = 0;
      }
      playPowerupSound(type);
    }

    function playLaserSound() {
      const t = audioCtx.currentTime;
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(180, t);
      osc.frequency.exponentialRampToValueAtTime(60, t + 0.12);
      gain.gain.setValueAtTime(0.15, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(t); osc.stop(t + 0.14);
    }

    function updatePowerups() {
      const now = Date.now();

      if (now - lastPowerupSpawnTime >= POWERUP_SPAWN_INTERVAL) {
        spawnPowerup();
        lastPowerupSpawnTime = now;
      }

      if (rapidFireActive && now >= rapidFireExpiry) rapidFireActive = false;

      for (let i = powerups.length - 1; i >= 0; i--) {
        const p = powerups[i];
        p.y     += p.speed;
        p.pulse += 0.08;

        if (p.y - p.radius > canvas.height) { powerups.splice(i, 1); continue; }

        // Circle vs AABB collision
        const nearX = Math.max(player.x - player.width/2,  Math.min(p.x, player.x + player.width/2));
        const nearY = Math.max(player.y - player.height/2, Math.min(p.y, player.y + player.height/2));
        if (Math.hypot(p.x - nearX, p.y - nearY) < p.radius) {
          applyPowerup(p.type);
          powerups.splice(i, 1);
        }
      }
    }

    function drawPowerups() {
      ctx.save();
      for (const p of powerups) {
        const glow = 8 + Math.sin(p.pulse) * 5;
        ctx.shadowColor = p.glow;
        ctx.shadowBlur  = glow;
        ctx.fillStyle   = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fill();

        // Inner highlight
        ctx.shadowBlur = 0;
        ctx.fillStyle  = 'rgba(255,255,255,0.35)';
        ctx.beginPath();
        ctx.arc(p.x - p.radius * 0.25, p.y - p.radius * 0.3, p.radius * 0.4, 0, Math.PI * 2);
        ctx.fill();

        // Type label
        ctx.fillStyle   = '#ffffff';
        ctx.font        = `bold ${p.radius}px Arial`;
        ctx.textAlign   = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(p.label, p.x, p.y + 1);
      }
      ctx.restore();
    }

    function playPowerupSound(type) {
      const t = audioCtx.currentTime;
      const freqs = type === 'triple' ? [523.25, 659.25, 783.99]

      freqs.forEach((freq, i) => {

        osc.start(s); osc.stop(s + 0.35);

    // --- Particles ---
    const particles = [];
    const PARTICLE_COLORS = ['#ff6600', '#ff3300', '#ff9900', '#ffcc00', '#ff2222'];

    function spawnParticles(x, y) {
      const count = 18;
      for (let i = 0; i < count; i++) {
        const angle  = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.4;
        const speed  = Math.random() * 3 + 1.5;
        particles.push({
          x,
          y,
          vx:      Math.cos(angle) * speed,
          vy:      Math.sin(angle) * speed,
          radius:  Math.random() * 3 + 1.5,
          alpha:   1,
          decay:   Math.random() * 0.025 + 0.02,   // fade speed
          color:   PARTICLE_COLORS[Math.floor(Math.random() * PARTICLE_COLORS.length)]
        });
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x     += p.vx;
        p.y     += p.vy;
        p.vy    += 0.05; // subtle gravity pull
        p.alpha -= p.decay;
        if (p.alpha <= 0) particles.splice(i, 1);
      }
    }

    function drawParticles() {
      ctx.save();
      for (const p of particles) {
        ctx.globalAlpha  = p.alpha;
        ctx.fillStyle    = p.color;
        ctx.shadowColor  = p.color;
        ctx.shadowBlur   = 6;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.restore();
    }

    function spawnBonusMonster() {
      const def  = BONUS_MONSTER_TYPES[Math.floor(Math.random() * BONUS_MONSTER_TYPES.length)];
      const margin = def.size / 2;
      bonusMonsters.push({
        ...def,

    function updateBonusMonsters() {
      const now = Date.now();
      // Only spawn from level 2 onward
      if (level >= 2 && now - lastBonusSpawnTime >= BONUS_SPAWN_INTERVAL) {
        spawnBonusMonster();
        lastBonusSpawnTime = now;
      }

      for (let i = bonusMonsters.length - 1; i >= 0; i--) {
        const m = bonusMonsters[i];
        m.y     += m.speed;
        m.pulse += 0.1;
        // Remove if past bottom — no life penalty, just disappears
        if (m.y - m.size / 2 > canvas.height) {
          bonusMonsters.splice(i, 1);
        }
      }
    }

    function drawBonusMonsters() {
      ctx.save();
      for (const m of bonusMonsters) {
        const x = m.x, y = m.y, s = m.size / 2;
        const glow = 10 + Math.sin(m.pulse) * 6;

        ctx.save();
        ctx.shadowColor = m.glow;
        ctx.shadowBlur  = glow;
        ctx.fillStyle   = m.color;

        if (m.variant === 'healer') {
          // Diamond shape
          ctx.beginPath();
          ctx.moveTo(x,     y - s);
          ctx.lineTo(x + s, y);
          ctx.lineTo(x,     y + s);
          ctx.lineTo(x - s, y);
          ctx.closePath();
          ctx.fill();
        } else {
          // 5-pointed star
          ctx.beginPath();
          for (let pt = 0; pt < 5; pt++) {
            const outerA = (pt * 4 * Math.PI / 5) - Math.PI / 2;
            const innerA = outerA + (2 * Math.PI / 10);
            const ox = x + Math.cos(outerA) * s;
            const oy = y + Math.sin(outerA) * s;
            const ix = x + Math.cos(innerA) * s * 0.45;
            const iy = y + Math.sin(innerA) * s * 0.45;
            pt === 0 ? ctx.moveTo(ox, oy) : ctx.lineTo(ox, oy);
            ctx.lineTo(ix, iy);
          }
          ctx.closePath();
          ctx.fill();
        }

        // Label and hp pip
        ctx.shadowBlur   = 0;
        ctx.fillStyle    = '#ffffff';
        ctx.font         = `bold ${Math.round(s * 0.9)}px Arial`;
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(m.label, x, y);

        // HP bar above monster
        if (m.maxHp > 1) {
          const bw = m.size, bh = 5;
          const bx = x - bw / 2, by = y - s - 10;
          ctx.fillStyle = '#333';
          ctx.fillRect(bx, by, bw, bh);
          ctx.fillStyle = m.color;
          ctx.fillRect(bx, by, bw * (m.hp / m.maxHp), bh);
          ctx.strokeStyle = m.glow;
          ctx.lineWidth = 1;
          ctx.strokeRect(bx, by, bw, bh);
        }

        // "1UP" floating tag
        ctx.fillStyle    = '#ffffff';
        ctx.font         = 'bold 11px Arial';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText('1UP ♥', x, y - s - (m.maxHp > 1 ? 24 : 14));

        ctx.restore();
      }
      ctx.restore();
    }

    function playLifeUpSound() {
      // Bright ascending chime — positive, rewarding
      const t = audioCtx.currentTime;
      [329.63, 392, 523.25, 659.25].forEach((freq, i) => {
        const osc  = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type   = 'sine';
        osc.frequency.value = freq;
        const s = t + i * 0.09;
        gain.gain.setValueAtTime(0.2, s);
        gain.gain.exponentialRampToValueAtTime(0.001, s + 0.25);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(s); osc.stop(s + 0.25);
      });
    }

    function playDamageSound() {
      const t = audioCtx.currentTime;

      // Low thud — sine drop
      const thud = audioCtx.createOscillator();
      const thudGain = audioCtx.createGain();
      thud.type = 'sine';
      thud.frequency.setValueAtTime(220, t);
      thud.frequency.exponentialRampToValueAtTime(55, t + 0.25);
      thudGain.gain.setValueAtTime(0.55, t);
      thudGain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      thud.connect(thudGain); thudGain.connect(audioCtx.destination);
      thud.start(t); thud.stop(t + 0.3);

      // Dissonant buzz on top
      const buzz = audioCtx.createOscillator();
      const buzzGain = audioCtx.createGain();
      buzz.type = 'sawtooth';
      buzz.frequency.setValueAtTime(180, t + 0.04);
      buzz.frequency.exponentialRampToValueAtTime(80, t + 0.22);
      buzzGain.gain.setValueAtTime(0.2, t + 0.04);
      buzzGain.gain.exponentialRampToValueAtTime(0.001, t + 0.24);
      buzz.connect(buzzGain); buzzGain.connect(audioCtx.destination);
      buzz.start(t + 0.04); buzz.stop(t + 0.24);
    }

    function checkBonusCollisions() {
      for (let mi = bonusMonsters.length - 1; mi >= 0; mi--) {
        const m = bonusMonsters[mi];
        const mLeft   = m.x - m.size / 2;
        const mRight  = m.x + m.size / 2;
        const mTop    = m.y - m.size / 2;
        const mBottom = m.y + m.size / 2;

        for (let bi = bullets.length - 1; bi >= 0; bi--) {
          const b = bullets[bi];
          const hit = (b.x + b.width / 2)  > mLeft  &&
                      (b.x - b.width / 2)  < mRight &&
                      (b.y + b.height)     > mTop   &&
                      b.y                  < mBottom;

          if (hit) {
            bullets.splice(bi, 1);
            m.hp--;

            if (m.hp <= 0) {
              // Grant +1 life (cap at 9 hearts)
              lives = Math.min(9, lives + 1);
              spawnParticles(m.x, m.y);
              spawnParticles(m.x, m.y); // double burst
              playLifeUpSound();
              bonusMonsters.splice(mi, 1);
            } else {
              spawnParticles(m.x, m.y);
              playExplosionSound(false);
            }
            break;
          }
        }
      }
    }

    function updateEnemies() {
      const now = Date.now();

      // Spawn regular enemy at level-scaled interval
      if (now - lastEnemySpawnTime >= enemySpawnInterval()) {
        spawnEnemy();
        lastEnemySpawnTime = now;
      }

      // Spawn boss every 30 seconds (only one at a time)
      if (!bossActive && now - lastBossSpawnTime >= BOSS_SPAWN_INTERVAL) {
        spawnBoss();
        lastBossSpawnTime = now;
      }

      // Move enemies downward; remove if past the bottom
      for (let i = enemies.length - 1; i >= 0; i--) {
        enemies[i].y += enemies[i].speed;
        if (enemies[i].y - enemies[i].size / 2 > canvas.height) {
          if (enemies[i].isBoss) bossActive = false;
          enemies.splice(i, 1);
          if (!invincible) {   // no life lost while invincible
            lives--;
            playDamageSound();
            if (lives <= 0) {
              lives = 0;
              gameOver = true;
              stopBGM();
            }

        }
      }
    }
