      ctx.bezierCurveTo(-s*0.1,   s*0.55, -s*0.22,  s*0.4, -s*0.2,   s*0.2);
      ctx.bezierCurveTo(-s*0.22, -s*0.1,  -s*0.18, -s*0.5,  0,       -s);
      ctx.closePath();
      ctx.fill();

      // Swept wings
      [[-1, 1], [1, -1]].forEach(([side, flip]) => {
        const wingGrad = ctx.createLinearGradient(side * s * 0.2, 0, side * s, s * 0.3);
        wingGrad.addColorStop(0,   '#4a90d9');
        wingGrad.addColorStop(0.5, '#1a4a80');
        wingGrad.addColorStop(1,   '#0a1e38');
        ctx.fillStyle = wingGrad;
        ctx.beginPath();
        ctx.moveTo(side * s * 0.18, -s * 0.05);
        ctx.bezierCurveTo(side * s * 0.55, -s * 0.25, side * s, -s * 0.05, side * s * 0.92,  s * 0.35);
        ctx.bezierCurveTo(side * s * 0.88,  s * 0.5,  side * s * 0.6,  s * 0.55, side * s * 0.22, s * 0.38);
        ctx.closePath();
        ctx.fill();

        // Wing neon stripe
        ctx.strokeStyle = gc;
        ctx.lineWidth   = 1.5;
        ctx.shadowColor = gc;
        ctx.shadowBlur  = 8;
        ctx.beginPath();
        ctx.moveTo(side * s * 0.25, s * 0.05);
        ctx.bezierCurveTo(side * s * 0.6, -s * 0.1, side * s * 0.88, s * 0.1, side * s * 0.88, s * 0.32);
        ctx.stroke();
      });

      // Cockpit canopy
      const cockpitGrad = ctx.createRadialGradient(-s*0.05, -s*0.25, 0, 0, -s*0.18, s*0.22);
      cockpitGrad.addColorStop(0,   'rgba(180,230,255,0.95)');
      cockpitGrad.addColorStop(0.5, 'rgba(80,160,220,0.7)');
      cockpitGrad.addColorStop(1,   'rgba(20,60,120,0.5)');
      ctx.shadowBlur = 0;
      ctx.fillStyle  = cockpitGrad;
      ctx.beginPath();
      ctx.ellipse(0, -s * 0.18, s * 0.13, s * 0.22, 0, 0, Math.PI * 2);
      ctx.fill();
      // Canopy reflection
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.beginPath();
      ctx.ellipse(-s * 0.04, -s * 0.28, s * 0.055, s * 0.08, -0.4, 0, Math.PI * 2);
      ctx.fill();

      // Nose energy tip
      const noseGlow = ctx.createRadialGradient(0, -s, 0, 0, -s, s * 0.12);
      noseGlow.addColorStop(0,   'rgba(150,220,255,1)');
      noseGlow.addColorStop(0.5, 'rgba(60,140,255,0.6)');
      noseGlow.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle = noseGlow;
      ctx.beginPath();
      ctx.arc(0, -s, s * 0.12, 0, Math.PI * 2);
      ctx.fill();

      // Hull panel lines
      ctx.strokeStyle = 'rgba(180,220,255,0.25)';
      ctx.lineWidth   = 0.8;
      ctx.shadowBlur  = 0;
      ctx.beginPath();
      ctx.moveTo(0, -s * 0.05); ctx.lineTo(0, s * 0.55);
      ctx.moveTo(-s * 0.1, s * 0.1); ctx.lineTo(s * 0.1, s * 0.1);
      ctx.moveTo(-s * 0.14, s * 0.28); ctx.lineTo(s * 0.14, s * 0.28);
      ctx.stroke();

      ctx.restore();
    }

    // Draw a regular enemy: alien saucer with tentacles and pulsing eye
    function drawEnemyCanvas(x, y, size, tick) {
      const s  = size / 2;
      ctx.save();
      ctx.translate(x, y);

      // Body glow
      const bGlow = ctx.createRadialGradient(0, 0, s * 0.1, 0, 0, s * 1.1);
      bGlow.addColorStop(0,   'rgba(255,60,60,0.15)');
      bGlow.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle = bGlow;
      ctx.beginPath();
      ctx.arc(0, 0, s * 1.1, 0, Math.PI * 2);
      ctx.fill();

      // Tentacles / spikes along bottom
      ctx.shadowColor = '#ff4400';
      ctx.shadowBlur  = 6;
      for (let i = 0; i < 5; i++) {
        const angle  = (Math.PI / 6) + (i * Math.PI * 2 / 7);
        const wobble = Math.sin(tick * 0.12 + i) * 0.15;
        const len    = s * (0.55 + (i % 2) * 0.2);
        ctx.strokeStyle = `hsl(${10 + i * 12}, 90%, ${55 + i * 5}%)`;
        ctx.lineWidth   = 2.5 - i * 0.2;
        ctx.lineCap     = 'round';
        ctx.beginPath();
        ctx.moveTo(Math.cos(angle) * s * 0.45, Math.sin(angle) * s * 0.45);
        ctx.quadraticCurveTo(
          Math.cos(angle + wobble) * s * 0.8,
          Math.sin(angle + wobble) * s * 0.8,
          Math.cos(angle + wobble * 2) * len,
          Math.sin(angle + wobble * 2) * len
        );
        ctx.stroke();
      }

      // Main saucer body
      const bodyGrad = ctx.createRadialGradient(-s * 0.2, -s * 0.2, 0, 0, 0, s);
      bodyGrad.addColorStop(0,   '#ff8866');
      bodyGrad.addColorStop(0.4, '#cc2200');
      bodyGrad.addColorStop(0.8, '#880000');
      bodyGrad.addColorStop(1,   '#440000');
      ctx.shadowColor = '#ff3300';
      ctx.shadowBlur  = 14;
      ctx.fillStyle   = bodyGrad;
      ctx.beginPath();
      ctx.ellipse(0, 0, s * 0.9, s * 0.65, 0, 0, Math.PI * 2);
      ctx.fill();

      // Top dome
      const domeGrad = ctx.createRadialGradient(-s * 0.15, -s * 0.3, 0, 0, -s * 0.1, s * 0.5);
      domeGrad.addColorStop(0,   '#ffccaa');
      domeGrad.addColorStop(0.5, '#ff6633');
      domeGrad.addColorStop(1,   '#cc1100');
      ctx.fillStyle = domeGrad;
      ctx.beginPath();
      ctx.ellipse(0, -s * 0.15, s * 0.5, s * 0.38, 0, 0, Math.PI * 2);
      ctx.fill();

      // Pulsing center eye
      const eyePulse = 0.7 + Math.sin(tick * 0.2) * 0.3;
      const eyeGrad  = ctx.createRadialGradient(0, 0, 0, 0, 0, s * 0.28 * eyePulse);
      eyeGrad.addColorStop(0,   'rgba(255,255,100,1)');
      eyeGrad.addColorStop(0.4, 'rgba(255,160,0,0.9)');
      eyeGrad.addColorStop(1,   'rgba(200,0,0,0)');
      ctx.shadowColor = '#ffaa00';
      ctx.shadowBlur  = 10 * eyePulse;
      ctx.fillStyle   = eyeGrad;
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.28 * eyePulse, 0, Math.PI * 2);
      ctx.fill();

      // Eye slit
      ctx.fillStyle = '#1a0000';
      ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.ellipse(0, 0, s * 0.1, s * 0.045, 0, 0, Math.PI * 2);
      ctx.fill();

      // Rim lights
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2 + tick * 0.04;
        ctx.fillStyle = `hsl(${30 + i * 20}, 100%, ${60 + Math.sin(tick * 0.15 + i) * 20}%)`;
        ctx.shadowColor = ctx.fillStyle;
        ctx.shadowBlur  = 5;
        ctx.beginPath();
        ctx.arc(Math.cos(a) * s * 0.78, Math.sin(a) * s * 0.42, s * 0.065, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    // Draw the boss: massive armored battlecruiser
    function drawBossCanvas(x, y, size, hp, maxHp, tick) {
      const s = size / 2;
      ctx.save();
      ctx.translate(x, y);

      // Outer menacing aura
      const aura = ctx.createRadialGradient(0, 0, s * 0.5, 0, 0, s * 1.6);
      aura.addColorStop(0,   'rgba(180,0,255,0.12)');
      aura.addColorStop(0.6, 'rgba(100,0,200,0.06)');
      aura.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle = aura;
      ctx.beginPath();
      ctx.arc(0, 0, s * 1.6, 0, Math.PI * 2);
      ctx.fill();

      // Engine trails
      [-s*0.35, 0, s*0.35].forEach(ox => {
        const trailLen = s * 0.6 + Math.sin(tick * 0.15 + ox) * s * 0.1;
        const tGrad = ctx.createLinearGradient(ox, s * 0.4, ox, s * 0.4 + trailLen);
        tGrad.addColorStop(0,   'rgba(200,80,255,0.9)');
        tGrad.addColorStop(0.5, 'rgba(120,0,200,0.4)');
        tGrad.addColorStop(1,   'rgba(0,0,0,0)');
        ctx.fillStyle = tGrad;
        ctx.beginPath();
        ctx.ellipse(ox, s * 0.4 + trailLen / 2, s * 0.09, trailLen / 2, 0, 0, Math.PI * 2);
        ctx.fill();
      });

      // Main hull
      const hullGrad = ctx.createLinearGradient(-s, -s, s, s);
      hullGrad.addColorStop(0,   '#d0a0ff');
      hullGrad.addColorStop(0.25, '#9040d0');
      hullGrad.addColorStop(0.6,  '#5010a0');
      hullGrad.addColorStop(1,    '#200040');
      ctx.shadowColor = '#cc44ff';
      ctx.shadowBlur  = 28;
      ctx.fillStyle   = hullGrad;
      // Hexagonal body
      ctx.beginPath();
      ctx.moveTo(0,          -s);
      ctx.lineTo( s * 0.55,  -s * 0.5);
      ctx.lineTo( s * 0.7,    s * 0.2);
      ctx.lineTo( s * 0.4,    s * 0.75);
      ctx.lineTo(-s * 0.4,    s * 0.75);
      ctx.lineTo(-s * 0.7,    s * 0.2);
      ctx.lineTo(-s * 0.55,  -s * 0.5);
      ctx.closePath();
      ctx.fill();

      // Shoulder cannons
      [-1, 1].forEach(side => {
        const cannonGrad = ctx.createLinearGradient(side * s * 0.5, -s * 0.3, side * s * 0.9, s * 0.1);
        cannonGrad.addColorStop(0,  '#c080ff');
        cannonGrad.addColorStop(1,  '#400080');
        ctx.fillStyle = cannonGrad;
        ctx.shadowColor = '#aa44ff';
        ctx.shadowBlur  = 10;
        ctx.beginPath();
        ctx.roundRect(side * s * 0.52, -s * 0.35, side * s * 0.38, s * 0.55, 4);
        ctx.fill();
        // Cannon barrel
        ctx.fillStyle = '#2a0060';
        ctx.beginPath();
        ctx.roundRect(side * s * 0.6, -s * 0.45, side * s * 0.22, s * 0.18, 3);
        ctx.fill();
        // Cannon glow tip
        const tipX = side > 0 ? s * 0.82 : -s * 0.82;
        const tipGlow = ctx.createRadialGradient(tipX, -s * 0.36, 0, tipX, -s * 0.36, s * 0.1);
        tipGlow.addColorStop(0,   `rgba(200,100,255,${0.6 + Math.sin(tick * 0.2 + side) * 0.4})`);
        tipGlow.addColorStop(1,   'rgba(0,0,0,0)');
        ctx.fillStyle = tipGlow;
        ctx.beginPath();
        ctx.arc(tipX, -s * 0.36, s * 0.1, 0, Math.PI * 2);
        ctx.fill();
      });

      // Core reactor (center)
      const reactorPulse = 0.65 + Math.sin(tick * 0.25) * 0.35;
      const reactorGrad  = ctx.createRadialGradient(0, 0, 0, 0, 0, s * 0.32 * reactorPulse);
      reactorGrad.addColorStop(0,   'rgba(255,255,255,1)');
      reactorGrad.addColorStop(0.3, `rgba(220,100,255,${reactorPulse})`);
      reactorGrad.addColorStop(0.8, 'rgba(100,0,200,0.4)');
      reactorGrad.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.shadowColor = '#ff88ff';
      ctx.shadowBlur  = 20 * reactorPulse;
      ctx.fillStyle   = reactorGrad;
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.32 * reactorPulse, 0, Math.PI * 2);
      ctx.fill();

      // Rotating energy ring
      ctx.save();
      ctx.rotate(tick * 0.03);
      ctx.strokeStyle = `rgba(200,120,255,${0.5 + Math.sin(tick * 0.2) * 0.3})`;
      ctx.lineWidth   = 2.5;
      ctx.shadowColor = '#cc66ff';
      ctx.shadowBlur  = 8;
      ctx.setLineDash([s * 0.25, s * 0.15]);
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.52, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();

      // Armour panel lines
      ctx.strokeStyle = 'rgba(200,150,255,0.3)';
      ctx.lineWidth   = 1;
      ctx.shadowBlur  = 0;
      ctx.beginPath();
      ctx.moveTo(-s * 0.3, -s * 0.6); ctx.lineTo( s * 0.3, -s * 0.6);
      ctx.moveTo(-s * 0.45, -s * 0.2); ctx.lineTo( s * 0.45, -s * 0.2);
      ctx.moveTo(-s * 0.4,  s * 0.25); ctx.lineTo( s * 0.4,  s * 0.25);
      ctx.moveTo(0, -s * 0.6); ctx.lineTo(0, s * 0.7);
      ctx.stroke();

      // Health bar
      const barW  = size * 1.1;
      const barH  = 8;
      const barX  = -barW / 2;
      const barY  = -s - 20;
      const fillW = barW * (hp / maxHp);
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(barX, barY, barW, barH);
      const barFill = ctx.createLinearGradient(barX, 0, barX + fillW, 0);
      barFill.addColorStop(0,   '#ff44ff');
      barFill.addColorStop(0.5, '#cc22ff');
      barFill.addColorStop(1,   '#8800cc');
      ctx.fillStyle = barFill;
      ctx.fillRect(barX, barY, fillW, barH);
      ctx.strokeStyle = '#cc44ff';
      ctx.lineWidth   = 1;
      ctx.strokeRect(barX, barY, barW, barH);
      // HP text
      ctx.fillStyle    = '#ffffff';
      ctx.font         = 'bold 10px Arial';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(`${hp} / ${maxHp}`, 0, barY + barH / 2);

      ctx.restore();
    }

    function drawEnemies() {
      for (const e of enemies) {
        if (e.isBoss) {
          drawBossCanvas(e.x, e.y, e.size, e.hp, e.maxHp, galaxyTick * 50);
        } else {
          drawEnemyCanvas(e.x, e.y, e.size, galaxyTick * 50);
        }
      }
    }

    // --- Collision detection (AABB) ---
    function checkCollisions() {
      for (let ei = enemies.length - 1; ei >= 0; ei--) {
        const e = enemies[ei];
        const eLeft   = e.x - e.size / 2;
        const eRight  = e.x + e.size / 2;
        const eTop    = e.y - e.size / 2;
        const eBottom = e.y + e.size / 2;

        for (let bi = bullets.length - 1; bi >= 0; bi--) {
          const b = bullets[bi];
          const bLeft   = b.x - b.width / 2;
          const bRight  = b.x + b.width / 2;
          const bTop    = b.y;
          const bBottom = b.y + b.height;

          const hit = bRight  > eLeft  &&
                      bLeft   < eRight &&
                      bBottom > eTop   &&
                      bTop    < eBottom;

          if (hit) {
            bullets.splice(bi, 1); // bullet always consumed
            e.hp--;

            if (e.hp <= 0) {
              // Bigger burst for the boss
              const burstCount = e.isBoss ? 3 : 1;
              for (let b = 0; b < burstCount; b++) spawnParticles(e.x, e.y);
              playExplosionSound(e.isBoss);
              if (e.isBoss) bossActive = false;
              score += e.points;
              enemies.splice(ei, 1);

              // Track kills — only count regular enemies toward daylight
              if (!e.isBoss) {
                totalKills++;
                if (totalKills % DAYLIGHT_KILL_THRESHOLD === 0) {
                  activateDaylight();
                }
              }
            } else {
              // Hit flash — briefly tint enemy lighter
              spawnParticles(e.x, e.y);
              playExplosionSound(false);
            }
            break;
          }
        }
      }
    }

    // --- Preload game images ---
    const shipImage  = new Image();
    shipImage.src    = 'image copy.png';   // player spaceship

    const enemyImage = new Image();
    enemyImage.src   = 'image.png';        // regular enemy

    const bossImage  = new Image();
    bossImage.src    = 'Boss.jpg';         // boss enemy

    // --- Draw player ---
    function drawPlayer() {
      const gc   = player.glowColor  || getSelectedShip().color || '#4488ff';
      const gr   = player.glowRadius || 20;
      const tick = galaxyTick * 50;
      const shipId = selectedShipId;

      // Ghost Cloak: semi-transparent
      const alpha = (cloakActive) ? 0.28 : 1;
      const showShip = !invincible || Math.floor(invincibleFlicker / 4) % 2 === 0;

      ctx.save();
      ctx.globalAlpha = alpha;

      if (showShip) {
        // Each ship type gets its own draw function
        if (shipId === 'titan')   drawTitanCanvas_ctx(ctx, player.x, player.y, player.width, player.height, gc, gr, tick);
        else if (shipId === 'phantom') drawPhantomCanvas_ctx(ctx, player.x, player.y, player.width, player.height, gc, gr, tick);
        else drawShipCanvas(player.x, player.y, player.width, player.height, gc, gr, tick);
      }

      ctx.globalAlpha = 1;

      // Level badge
      if (level > 1 && showShip) {
        ctx.shadowBlur  = 0;
        const badgeX = player.x;
        const badgeY = player.y - player.height / 2 - 14;
        const badgeR = 11;
        ctx.fillStyle   = gc;
        ctx.globalAlpha = 0.9;
        ctx.beginPath();
        ctx.arc(badgeX, badgeY, badgeR, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha  = 1;
        ctx.fillStyle    = '#ffffff';
        ctx.font         = `bold ${badgeR}px Arial`;
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(`${level}`, badgeX, badgeY + 1);
      }
      ctx.restore();
    }

    // --- Update logic ---
    function update(dt = 16) {
      if (!gameStarted || gameOver || gamePaused) return;

      if (keys['ArrowLeft'])  player.x -= player.speed;
      if (keys['ArrowRight']) player.x += player.speed;

      const halfW = player.width / 2;
      if (player.x - halfW < 0)            player.x = halfW;
      if (player.x + halfW > canvas.width) player.x = canvas.width - halfW;

      updateLevel(dt);
      updateDaylight(dt);
      updateSpecialPower(dt);
      updateStars();
      updateBullets();
      updateLaser(dt);
      updateEnemies();
      updateBonusMonsters();
      updatePowerups();
      checkCollisions();
      checkBonusCollisions();
      updateParticles();
    }

    // --- Render ---
    function draw() {
      // ── Background ──
      if (daylightActive) {
        // Daylight sky gradient
        const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
        sky.addColorStop(0,   '#1a6fc4');
        sky.addColorStop(0.4, '#55aaee');
        sky.addColorStop(1,   '#aaddff');
        ctx.fillStyle = sky;
      } else {
        ctx.fillStyle = '#000000';
      }
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Stars only in space mode (hide in daylight)
      if (!daylightActive) drawStars();

      // Daylight sun
      if (daylightActive) {
        ctx.save();
        const sunX = canvas.width * 0.8;
        const sunY = canvas.height * 0.15;
        const sunGrad = ctx.createRadialGradient(sunX, sunY, 10, sunX, sunY, 90);
        sunGrad.addColorStop(0,   'rgba(255,255,200,1)');
        sunGrad.addColorStop(0.4, 'rgba(255,220,80,0.8)');
        sunGrad.addColorStop(1,   'rgba(255,180,0,0)');
        ctx.fillStyle = sunGrad;
        ctx.beginPath();
        ctx.arc(sunX, sunY, 90, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      drawBullets();
      drawLaser();
      drawPowerups();
      drawEnemies();

      drawParticles();
      drawBonusMonsters();
      drawSpecialEffects();

      // ── Draw player ──
      drawPlayer();

      // --- HUD: Score (top-left) ---
      ctx.save();
      ctx.fillStyle    = daylightActive ? '#003366' : '#ffffff';
      ctx.font         = 'bold 18px Arial';
      ctx.textBaseline = 'top';
      ctx.fillText(`Score: ${score}`, 16, 16);

      // --- HUD: Level (top-left, below score) ---
      ctx.fillStyle = daylightActive ? '#cc6600' : '#ffdd44';
      ctx.fillText(`Level: ${level}`, 16, 42);

      // --- HUD: Kills to next daylight ---
      const killsToNext = DAYLIGHT_KILL_THRESHOLD - (totalKills % DAYLIGHT_KILL_THRESHOLD);
      ctx.fillStyle = daylightActive ? '#003366' : '#aaaaaa';
      ctx.font      = '13px Arial';
      ctx.fillText(daylightActive ? '☀ DAYLIGHT ACTIVE' : `☀ Next power: ${killsToNext} kills`, 16, 68);
      ctx.restore(); // end main HUD save block

      // --- Controls panel (left side, below HUD) ---
      const controls = [
        { key: '← →',      desc: 'Move ship'       },
        { key: 'Space',     desc: 'Shoot'           },
        { key: 'P / Esc',   desc: 'Pause / Resume'  },
        { key: 'R',         desc: 'Restart'         },
        { key: 'M',         desc: 'Main menu'       },
        { key: '⚡',        desc: 'Rapid fire'      },
        { key: '❙❙',       desc: 'Double shot'     },
        { key: '❙❙❙',      desc: 'Triple shot'     },
        { key: '▌',         desc: 'Laser beam'      },
        { key: '◆ / ★',    desc: '+1 Life monster' },
      ];

      const panelX    = 12;
      const panelY    = 108;
      const lineH     = 20;
      const panelW    = 168;
      const panelH    = controls.length * lineH + 20;
      const keyColW   = 58;

      ctx.save();

      // Panel background
      ctx.fillStyle = daylightActive
        ? 'rgba(0,30,80,0.45)'
        : 'rgba(0,0,0,0.48)';
      ctx.strokeStyle = daylightActive
        ? 'rgba(0,80,180,0.4)'
        : 'rgba(80,140,255,0.22)';
      ctx.lineWidth   = 1;
      ctx.beginPath();
      ctx.roundRect(panelX, panelY, panelW, panelH, 8);
      ctx.fill();
      ctx.stroke();

      // Title
      ctx.fillStyle    = daylightActive ? '#003388' : 'rgba(120,180,255,0.7)';
      ctx.font         = 'bold 11px Arial';
      ctx.textBaseline = 'top';
      ctx.textAlign    = 'left';
      ctx.fillText('CONTROLS', panelX + 10, panelY + 6);

      // Rows
      controls.forEach((c, i) => {
        const rowY = panelY + 22 + i * lineH;

        // Key badge
        ctx.fillStyle = daylightActive
          ? 'rgba(0,60,140,0.55)'
          : 'rgba(30,80,180,0.45)';
        ctx.beginPath();
        ctx.roundRect(panelX + 6, rowY, keyColW - 4, lineH - 4, 4);
        ctx.fill();

        ctx.fillStyle    = daylightActive ? '#002266' : '#aaccff';
        ctx.font         = 'bold 10px Arial';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(c.key, panelX + 6 + (keyColW - 4) / 2, rowY + (lineH - 4) / 2);

        // Description
        ctx.fillStyle    = daylightActive ? '#003366' : 'rgba(200,220,255,0.75)';
        ctx.font         = '10px Arial';
        ctx.textAlign    = 'left';
        ctx.fillText(c.desc, panelX + keyColW + 8, rowY + (lineH - 4) / 2);
      });

      ctx.restore();

      // --- HUD: Lives as hearts (top-right) ---
      const heartSize  = 22;
      const heartGap   = 6;
      const totalHeartW = lives * (heartSize + heartGap) - heartGap;
      let hx = canvas.width - 16 - totalHeartW;
      const hy = 13;
      for (let i = 0; i < lives; i++) {
        const cx = hx + heartSize / 2;
        const cy = hy + heartSize * 0.45;
        const r  = heartSize * 0.27;
        ctx.save();
        ctx.fillStyle   = invincible ? '#ffff00' : '#ff3355';
        ctx.shadowColor = invincible ? '#ffff00' : '#ff0033';
        ctx.shadowBlur  = invincible ? 10 : 6;
        ctx.beginPath();
        ctx.arc(cx - r, cy - r * 0.2, r, Math.PI, 0);
        ctx.arc(cx + r, cy - r * 0.2, r, Math.PI, 0);
        ctx.lineTo(cx + r * 2, cy - r * 0.2);
        ctx.quadraticCurveTo(cx + r * 2, cy + r, cx, cy + r * 2.2);
        ctx.quadraticCurveTo(cx - r * 2, cy + r, cx - r * 2, cy - r * 0.2);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
        hx += heartSize + heartGap;
      }

      // --- HUD: Daylight / Invincibility timer bar ---
      if (daylightActive) {
        const fraction = Math.max(0, daylightTimer / DAYLIGHT_DURATION);
        const barW = 220;
        const barH = 12;
        const barX = canvas.width / 2 - barW / 2;
        const barY = 10;

        ctx.save();
        ctx.fillStyle    = '#ffaa00';
        ctx.font         = 'bold 13px Arial';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'top';
        ctx.shadowColor  = '#ffdd00';
        ctx.shadowBlur   = 10;
        ctx.fillText('☀ DAYLIGHT  •  🛡 INVINCIBLE', canvas.width / 2, barY - 1);

        ctx.shadowBlur  = 0;
        ctx.fillStyle   = 'rgba(0,0,0,0.3)';
        ctx.fillRect(barX, barY + 18, barW, barH);

        // Animated gradient fill
        const fillGrad = ctx.createLinearGradient(barX, 0, barX + barW * fraction, 0);
        fillGrad.addColorStop(0, '#ffee00');
        fillGrad.addColorStop(1, '#ff9900');
        ctx.fillStyle = fillGrad;
        ctx.fillRect(barX, barY + 18, barW * fraction, barH);

        ctx.strokeStyle = '#ffcc00';
        ctx.lineWidth   = 1.5;
        ctx.strokeRect(barX, barY + 18, barW, barH);
        ctx.restore();
      }

      // --- Level-up banner ---
      if (levelUpBannerTimer > 0) {
        const alpha = Math.min(1, levelUpBannerTimer / 400);
        const stats = shipStatsForLevel(level);
        ctx.save();
        ctx.globalAlpha  = alpha;
        ctx.fillStyle    = stats.glowColor;
        ctx.font         = 'bold 48px Arial';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor  = stats.glowColor;
        ctx.shadowBlur   = 24;
        ctx.fillText(`LEVEL ${level}!`, canvas.width / 2, canvas.height / 2 - 130);
        ctx.font      = 'bold 20px Arial';
        ctx.shadowBlur = 8;
        ctx.fillStyle  = '#ffffff';
        ctx.fillText(`🚀 Ship Upgraded!  Speed +  Size +  Firepower +`, canvas.width / 2, canvas.height / 2 - 78);
        ctx.restore();
      }

      // --- HUD: Active power-up status bars ---
      let barSlot = 0; // stack bars vertically when multiple are active

      function drawStatusBar(label, fraction, fillColor, glowColor) {
        const barW = 180, barH = 10;
        const barX = canvas.width / 2 - barW / 2;
        const barY = 10 + barSlot * 32;
        ctx.save();
        ctx.fillStyle    = glowColor;
        ctx.font         = 'bold 12px Arial';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'top';
        ctx.shadowColor  = glowColor;
        ctx.shadowBlur   = 8;
        ctx.fillText(label, canvas.width / 2, barY);
        ctx.shadowBlur = 0;
        ctx.fillStyle  = 'rgba(0,0,0,0.4)';
        ctx.fillRect(barX, barY + 15, barW, barH);
        ctx.fillStyle = fillColor;
        ctx.fillRect(barX, barY + 15, barW * Math.max(0, fraction), barH);
        ctx.strokeStyle = glowColor;
        ctx.lineWidth   = 1;
        ctx.strokeRect(barX, barY + 15, barW, barH);
        ctx.restore();
        barSlot++;
      }

      if (rapidFireActive) {
        const rem = Math.max(0, rapidFireExpiry - Date.now());
        drawStatusBar('⚡ RAPID FIRE', rem / RAPID_FIRE_DURATION, '#00ff44', '#00ff88');
      }
      if (shotMode === 'double') {
        const rem = Math.max(0, shotModeExpiry - Date.now());
        drawStatusBar('❙❙ DOUBLE SHOT', rem / SHOT_MODE_DURATION, '#00ccff', '#88eeff');
      }
      if (shotMode === 'triple') {
        const rem = Math.max(0, shotModeExpiry - Date.now());
        drawStatusBar('❙❙❙ TRIPLE SHOT', rem / SHOT_MODE_DURATION, '#ff44ff', '#ff88ff');
      }
      if (laserActive) {
        const rem = Math.max(0, laserExpiry - Date.now());
        drawStatusBar('▌ LASER BEAM', rem / LASER_DURATION, '#ff6600', '#ff8833');
      }

      // --- Pause overlay ---
      if (gamePaused) {
        const pw = 440, ph = 340;
        const px = canvas.width  / 2 - pw / 2;
        const py = canvas.height / 2 - ph / 2;

        ctx.save();

        // Full-screen dim
        ctx.fillStyle = 'rgba(0, 0, 10, 0.62)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Panel background with galaxy tint
        ctx.fillStyle = 'rgba(4, 0, 28, 0.92)';
        ctx.beginPath(); ctx.roundRect(px, py, pw, ph, 14); ctx.fill();

        // Panel border glow
        ctx.strokeStyle = 'rgba(0, 180, 255, 0.45)';
        ctx.lineWidth   = 1.5;
        ctx.shadowColor = '#00aaff';
        ctx.shadowBlur  = 18;
        ctx.beginPath(); ctx.roundRect(px, py, pw, ph, 14); ctx.stroke();
        ctx.shadowBlur = 0;

        // Corner brackets
        const bLen = 18, bT = 2;
        ctx.strokeStyle = '#00d4ff'; ctx.lineWidth = bT;
        [[px+8, py+8, 1, 1], [px+pw-8, py+8, -1, 1],
         [px+8, py+ph-8, 1, -1], [px+pw-8, py+ph-8, -1, -1]].forEach(([bx, by, dx, dy]) => {
          ctx.beginPath();
          ctx.moveTo(bx, by + dy * bLen); ctx.lineTo(bx, by); ctx.lineTo(bx + dx * bLen, by);
          ctx.stroke();
        });

        // Title
        ctx.fillStyle    = '#ffffff';
        ctx.font         = 'bold 42px Orbitron, Arial';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor  = '#00aaff';
        ctx.shadowBlur   = 20;
        ctx.fillText('II  PAUSED', canvas.width / 2, py + 62);
        ctx.shadowBlur = 0;

        // Divider line
        ctx.strokeStyle = 'rgba(0, 180, 255, 0.2)';
        ctx.lineWidth   = 1;
        ctx.beginPath();
        ctx.moveTo(px + 30, py + 96); ctx.lineTo(px + pw - 30, py + 96);
        ctx.stroke();

        // Menu items
        const menuItems = [
          { label: '▶  Resume',        action: 'resume', color: '#00d4ff' },
          { label: '↺  Restart',       action: 'restart', color: '#aaccff' },
          { label: '⌂  Exit to Menu',  action: 'menu',   color: '#ff6688' },
        ];
        const itemH = 52, itemY0 = py + 118;
        const hoveredItem = pauseHoverIndex;

        menuItems.forEach((item, i) => {
          const iy = itemY0 + i * itemH;
          const isHov = (i === hoveredItem);

          // Hover highlight
          if (isHov) {
            ctx.fillStyle = 'rgba(0, 180, 255, 0.10)';
            ctx.beginPath(); ctx.roundRect(px + 22, iy - 4, pw - 44, itemH - 6, 8); ctx.fill();
            ctx.strokeStyle = 'rgba(0,200,255,0.25)'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.roundRect(px + 22, iy - 4, pw - 44, itemH - 6, 8); ctx.stroke();
          }

          ctx.fillStyle    = isHov ? '#ffffff' : item.color;
          ctx.font         = `${isHov ? 'bold' : 'normal'} 18px Orbitron, Arial`;
          ctx.textAlign    = 'center';
          ctx.textBaseline = 'middle';
          ctx.shadowColor  = item.color;
          ctx.shadowBlur   = isHov ? 12 : 0;
          ctx.fillText(item.label, canvas.width / 2, iy + (itemH - 6) / 2 - 4);
          ctx.shadowBlur = 0;
        });

        // Hint
        ctx.fillStyle    = 'rgba(120,160,200,0.45)';
        ctx.font         = '12px Arial';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText('P / Esc to resume  •  ↑↓ navigate  •  Enter to select', canvas.width / 2, py + ph - 10);

        ctx.restore();
      }

      // --- Game Over overlay ---
      if (gameOver) {
        ctx.save();
        ctx.fillStyle = 'rgba(0, 0, 0, 0.65)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#ff2222';
        ctx.font = 'bold 72px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = '#ff2222';
        ctx.shadowBlur = 20;
        ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 60);

        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 28px Arial';
        ctx.shadowBlur = 0;
        ctx.fillText(`Final Score: ${score}  |  Level: ${level}`, canvas.width / 2, canvas.height / 2 + 10);

        ctx.fillStyle = '#aaaaaa';
        ctx.font = '20px Arial';
        ctx.fillText('Press R to Restart  •  Press M for Menu', canvas.width / 2, canvas.height / 2 + 60);
        ctx.restore();
      }
    }

    // --- Game loop ---
    let lastTimestamp = 0;
    function gameLoop(timestamp) {
      // While paused: still draw (shows pause overlay) but skip dt so timers don't jump on resume
      const dt = gamePaused ? 0 : timestamp - lastTimestamp;
      lastTimestamp = timestamp;
      update(dt);
      draw();
      requestAnimationFrame(gameLoop);
    }

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
